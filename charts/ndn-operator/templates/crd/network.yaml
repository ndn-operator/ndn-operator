                type: object
              ipFamily:
                default: IPv4
                description: |-
                  Preferred IP family for inter-router UDP faces. Defaults to IPv4.
                  When set to IPv4, only an IPv4 UDP face will be published per router (with IPv6 as a fallback if IPv4 is not available on the node).
                  When set to IPv6, only an IPv6 UDP face will be published per router (with IPv4 as a fallback if IPv6 is not available on the node).
                enum:
                - IPv4
                - IPv6
                type: string
              ndnd:
                default:
                  image: ghcr.io/named-data/ndnd:latest
                description: The NDND image to use for the network controller
                properties:
                  image:
                    type: string
                required:
                - image
                type: object
              nodeSelector:
                additionalProperties:
                  type: string
                description: Node selector for router DaemonSet pods. Prefer spec.template.nodeSelector for new configs.
                nullable: true
                type: object
              operator:
                description: |-
                  The operator image to use for the network controller.
                  If not specified, the operator will use its own image
                nullable: true
                properties:
                  image:
                    type: string
                required:
                - image
                type: object
              prefix:
                description: |-
                  The application prefix injected into workloads attached to this network.
                  This should be a valid NDN prefix, e.g., "/example/network".
                type: string
              routerCertIssuer:
                description: |-
                  The certificate issuer for the router certificates.
                  If not specified, the network will be insecure (no certificates)
                nullable: true
                properties:
                  kind:
                    description: |-
                      The kind of the issuer, e.g., "Certificate".
                      "Certificate" and "ExternalCertificate" are supported
                      "ExternalCertificate" must have a key to sign certificates
                    type: string
                  name:
                    description: The name of the issuer, e.g., "router-cert"
                    type: string
                  namespace:
                    description: |-
                      The namespace of the issuer
                      If not specified, the certificate's namespace will be used
                    nullable: true
                    type: string
                required:
                - kind
                - name
                type: object
              template:
                description: Pod template settings for the router DaemonSet managed by this network
                nullable: true
                properties:
                  affinity:
                    description: Affinity for router DaemonSet pods.
                    nullable: true
                    properties:
                      nodeAffinity:
                        description: Describes node affinity scheduling rules for the pod.
                        properties:
                          preferredDuringSchedulingIgnoredDuringExecution:
                            description: The scheduler will prefer to schedule pods to nodes that satisfy the affinity expressions specified by this field, but it may choose a node that violates one or more of the expressions. The node that is most preferred is the one with the greatest sum of weights, i.e. for each node that meets all of the scheduling requirements (resource request, requiredDuringScheduling affinity expressions, etc.), compute a sum by iterating through the elements of this field and adding "weight" to the sum if the node matches the corresponding matchExpressions; the node(s) with the highest sum are the most preferred.
                            items:
                              description: An empty preferred scheduling term matches all objects with implicit weight 0 (i.e. it's a no-op). A null preferred scheduling term matches no objects (i.e. is also a no-op).
                              properties:
                                preference:
                                  description: A node selector term, associated with the corresponding weight.
                                  properties:
                                    matchExpressions:
                                      description: A list of node selector requirements by node's labels.
                                      items:
                                        description: A node selector requirement is a selector that contains values, a key, and an operator that relates the key and values.
                                        properties:
                                          key:
                                            description: The label key that the selector applies to.
                                            type: string
                                          operator:
                                            description: Represents a key's relationship to a set of values. Valid operators are In, NotIn, Exists, DoesNotExist. Gt, and Lt.
                                            type: string
                                          values:
                                            description: An array of string values. If the operator is In or NotIn, the values array must be non-empty. If the operator is Exists or DoesNotExist, the values array must be empty. If the operator is Gt or Lt, the values array must have a single element, which will be interpreted as an integer. This array is replaced during a strategic merge patch.
                                            items:
                                              type: string
                                            type: array
                                        required:
                                        - key
                                        - operator
                                        type: object
                                      type: array
                                    matchFields:
                                      description: A list of node selector requirements by node's fields.
                                      items:
                                        description: A node selector requirement is a selector that contains values, a key, and an operator that relates the key and values.
                                        properties:
                                          key:
                                            description: The label key that the selector applies to.
                                            type: string
                                          operator:
                                            description: Represents a key's relationship to a set of values. Valid operators are In, NotIn, Exists, DoesNotExist. Gt, and Lt.
                                            type: string
                                          values:
                                            description: An array of string values. If the operator is In or NotIn, the values array must be non-empty. If the operator is Exists or DoesNotExist, the values array must be empty. If the operator is Gt or Lt, the values array must have a single element, which will be interpreted as an integer. This array is replaced during a strategic merge patch.
                                            items:
                                              type: string
                                            type: array
                                        required:
                                        - key
                                        - operator
                                        type: object
                                      type: array
                                  type: object
                                weight:
                                  description: Weight associated with matching the corresponding nodeSelectorTerm, in the range 1-100.
                                  format: int32
                                  type: integer
                              required:
                              - preference
                              - weight
                              type: object
