[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-musl",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true

[advisories]
unmaintained = "workspace"

[bans]
multiple-versions = "deny"
wildcards = 'deny'
deny = [
    { crate = "git2", use-instead = "gix" },
    { crate = "openssl", use-instead = "rustls" },
    { crate = "openssl-sys", use-instead = "rustls" },
    "libssh2-sys",
    { crate = "cmake", use-instead = "cc" },
    { crate = "windows", reason = "bloated and unnecessary", use-instead = "ideally inline bindings, practically, windows-sys" },
]
skip = [
    { crate = "getrandom", reason = "tokio-rustls/ahash currently require incompatible major versions" },
    { crate = "http", reason = "actix-web stack still uses http 0.2 while kube uses http 1.x" },
    { crate = "socket2", reason = "actix-web and tokio currently need both 0.5 and 0.6" },
    { crate = "darling", reason = "local-ip-address/neli uses derive_builder on darling 0.20 while kube/serde_with macros use darling 0.23" },
    { crate = "darling_core", reason = "local-ip-address/neli uses derive_builder on darling 0.20 while kube/serde_with macros use darling 0.23" },
    { crate = "darling_macro", reason = "local-ip-address/neli uses derive_builder on darling 0.20 while kube/serde_with macros use darling 0.23" },
    { crate = "foldhash", reason = "actix-web uses foldhash 0.1 while kube-runtime/hashbrown uses foldhash 0.2" },
    { crate = "hashbrown", reason = "indexmap/serde_yaml use hashbrown 0.15 while kube-runtime uses hashbrown 0.16" },
]
skip-tree = [
    { crate = "windows-sys", reason = "a foundational crate for many that bumps far too frequently to ever have a shared version" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"

[licenses]
# We want really high confidence when inferring licenses from text
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
