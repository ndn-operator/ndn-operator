name: Build and Push Docker Image
on:
  push:
    tags:
    - v*
    paths-ignore:
    - README.md
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
    - ready_for_review
    - labeled
    branches:
    - main
    - release/*
    paths-ignore:
    - README.md
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  version:
    runs-on: ubuntu-24.04
    outputs:
      sha_short: ${{ steps.sha_short.outputs.sha_short }}
      version: ${{ steps.version_tag.outputs.version || steps.read_toml_version.outputs.value }}
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Dump GitHub context
      env:
        GITHUB_CONTEXT: ${{ toJson(github) }}
      run: jq <<< "$GITHUB_CONTEXT"
    - name: Get the version tag
      id: version_tag
      if: github.ref_type == 'tag'
      env:
        REF_NAME: "${{ github.ref_name }}"
      run: |
        echo "version=${REF_NAME#v}" >> $GITHUB_OUTPUT
    - uses: SebRollen/toml-action@v1.2.0
      if: github.ref_type == 'branch'
      id: read_toml_version
      with:
        file: Cargo.toml
        field: package.version
    - name: Get the short version
      id: sha_short
      env:
        FULL_SHA: "${{ github.sha }}"
      run: |
        echo "sha_short=$(git rev-parse --short $FULL_SHA)" >> $GITHUB_OUTPUT
  build-amd64:
    runs-on: ubuntu-24.04
    needs: version
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Update Cargo.toml
      uses: colathro/toml-editor@1.1.1
      if: github.event_name == 'push'
      with:
        file: Cargo.toml
        key: package.version
        value: ${{ needs.version.outputs.version }}+${{ needs.version.outputs.sha_short }}
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Docker Meta
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        flavor: latest=false,suffix=-amd64
    - name: Build and push Docker image
      id: push
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          TARGET=x86_64-unknown-linux-musl
        platforms: linux/amd64
        cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64-cache
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64-cache,mode=max
    - name: Generate artifact attestation
      uses: actions/attest-build-provenance@v4
      with:
        subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
        subject-digest: ${{ steps.push.outputs.digest }}
        push-to-registry: true
  build-arm64:
    runs-on: ubuntu-24.04-arm
    needs: version
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Update Cargo.toml
      uses: colathro/toml-editor@1.1.1
      if: github.event_name == 'push'
      with:
        file: Cargo.toml
        key: package.version
        value: ${{ needs.version.outputs.version }}+${{ needs.version.outputs.sha_short }}
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Docker Meta
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        flavor: latest=false,suffix=
    - name: Build and push Docker image
      id: push
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          TARGET=aarch64-unknown-linux-musl
        platforms: linux/arm64
        cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-cache
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-cache,mode=max
    - name: Generate artifact attestation
      uses: actions/attest-build-provenance@v4
      with:
        subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
        subject-digest: ${{ steps.push.outputs.digest }}
        push-to-registry: true
  build:
    needs:
    - build-amd64
    - build-arm64
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      attestations: write
      id-token: write
    steps:
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Docker Meta
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha
    - uses: int128/docker-manifest-create-action@v2
      id: manifest
      with:
        index-annotations: ${{ steps.meta.outputs.labels }}
        tags: ${{ steps.meta.outputs.tags }}
        sources: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-amd64.outputs.digest }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-arm64.outputs.digest }}
    - name: Generate artifact attestation
      uses: actions/attest-build-provenance@v4
      with:
        subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
        subject-digest: ${{ steps.manifest.outputs.digest }}
        push-to-registry: true
  gke-integration:
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft && contains(github.event.pull_request.labels.*.name, 'run-gke-integration')
    needs:
    - build
    runs-on: ubuntu-24.04
    environment: gke-integration
    concurrency:
      group: gke-integration-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
      packages: read
      pull-requests: read
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_project_id: ${{ vars.GKE_INTEGRATION_PROJECT_ID }}
      TF_VAR_region: ${{ vars.GKE_INTEGRATION_REGION || 'us-west1' }}
      TF_VAR_location: ${{ vars.GKE_INTEGRATION_LOCATION || 'us-west1-a' }}
      TF_VAR_machine_type: ${{ vars.GKE_INTEGRATION_MACHINE_TYPE || 'n4a-standard-2' }}
      TF_VAR_peer_region: ${{ vars.GKE_INTEGRATION_PEER_REGION || 'us-south1' }}
      TF_VAR_peer_location: ${{ vars.GKE_INTEGRATION_PEER_LOCATION || 'us-south1-a' }}
      TF_VAR_peer_machine_type: ${{ vars.GKE_INTEGRATION_PEER_MACHINE_TYPE || 'e2-standard-2' }}
      TF_VAR_name: ndn-it-${{ github.event.pull_request.number }}-${{ github.run_id }}
      TF_VAR_pr_number: ${{ github.event.pull_request.number }}
      TF_VAR_run_id: ${{ github.run_id }}
      TF_VAR_commit_sha: ${{ github.event.pull_request.head.sha }}
    steps:
    - name: Checkout trusted integration harness
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.base.sha }}
        path: trusted
    - name: Checkout PR sources under test
      uses: actions/checkout@v6
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        ref: ${{ github.event.pull_request.head.sha }}
        path: under-test
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        project_id: ${{ vars.GKE_INTEGRATION_PROJECT_ID }}
        workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
    - name: Set up gcloud
      uses: google-github-actions/setup-gcloud@v3
    - name: Set up kubectl
      uses: azure/setup-kubectl@v5
    - name: Set up Helm
      uses: azure/setup-helm@v5
    - name: Set up OpenTofu
      uses: opentofu/setup-opentofu@v2
      with:
        tofu_wrapper: false
    - name: Detect runner public IP
      id: runner-ip
      run: |
        runner_ip="$(curl -fsSL https://api.ipify.org)"
        echo "cidr=${runner_ip}/32" >> "$GITHUB_OUTPUT"
        echo "Authorized control-plane CIDR: ${runner_ip}/32"
    - name: OpenTofu init
      id: tofu-init
      working-directory: trusted/infra/gke-integration
      run: |
        tofu init -input=false \
          -backend-config="bucket=${{ vars.GKE_INTEGRATION_STATE_BUCKET }}" \
          -backend-config="prefix=ndn-operator/gke-integration/pr-${{ github.event.pull_request.number }}/run-${{ github.run_id }}"
    - name: OpenTofu validate
      working-directory: trusted/infra/gke-integration
      env:
        TF_VAR_authorized_cidr: ${{ steps.runner-ip.outputs.cidr }}
      run: tofu validate -no-color
    - name: OpenTofu apply
      id: tofu-apply
      working-directory: trusted/infra/gke-integration
      env:
        TF_VAR_authorized_cidr: ${{ steps.runner-ip.outputs.cidr }}
      run: tofu apply -auto-approve -input=false -no-color
    - name: Refresh Google Cloud auth
      uses: google-github-actions/auth@v3
      with:
        project_id: ${{ vars.GKE_INTEGRATION_PROJECT_ID }}
        workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
    - name: Read cluster outputs
      id: tofu-output
      working-directory: trusted/infra/gke-integration
      run: |
        echo "cluster_name=$(tofu output -raw cluster_name)" >> "$GITHUB_OUTPUT"
        echo "cluster_location=$(tofu output -raw cluster_location)" >> "$GITHUB_OUTPUT"
        echo "peer_cluster_name=$(tofu output -raw peer_cluster_name)" >> "$GITHUB_OUTPUT"
        echo "peer_cluster_location=$(tofu output -raw peer_cluster_location)" >> "$GITHUB_OUTPUT"
    - name: Get primary GKE credentials
      id: primary-credentials
      uses: google-github-actions/get-gke-credentials@v3
      with:
        project_id: ${{ vars.GKE_INTEGRATION_PROJECT_ID }}
        cluster_name: ${{ steps.tofu-output.outputs.cluster_name }}
        location: ${{ steps.tofu-output.outputs.cluster_location }}
    - name: Get peer GKE credentials
      id: peer-credentials
      uses: google-github-actions/get-gke-credentials@v3
      with:
        project_id: ${{ vars.GKE_INTEGRATION_PROJECT_ID }}
        cluster_name: ${{ steps.tofu-output.outputs.peer_cluster_name }}
        location: ${{ steps.tofu-output.outputs.peer_cluster_location }}
    - name: Run NDN integration tests
      env:
        OPERATOR_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}
        REPO_UNDER_TEST_DIR: ${{ github.workspace }}/under-test
        PRIMARY_KUBECONFIG: ${{ steps.primary-credentials.outputs.kubeconfig_path }}
        PEER_KUBECONFIG: ${{ steps.peer-credentials.outputs.kubeconfig_path }}
      run: trusted/hack/integration/run-gke-tests.sh
    - name: Refresh Google Cloud auth before artifacts
      if: always() && (steps.primary-credentials.outcome == 'success' || steps.peer-credentials.outcome == 'success')
      uses: google-github-actions/auth@v3
      with:
        project_id: ${{ vars.GKE_INTEGRATION_PROJECT_ID }}
        workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
    - name: Refresh primary GKE credentials before artifacts
      id: primary-artifact-credentials
      if: always() && steps.primary-credentials.outcome == 'success'
      uses: google-github-actions/get-gke-credentials@v3
      with:
        project_id: ${{ vars.GKE_INTEGRATION_PROJECT_ID }}
        cluster_name: ${{ steps.tofu-output.outputs.cluster_name }}
        location: ${{ steps.tofu-output.outputs.cluster_location }}
    - name: Refresh peer GKE credentials before artifacts
      id: peer-artifact-credentials
      if: always() && steps.peer-credentials.outcome == 'success'
      uses: google-github-actions/get-gke-credentials@v3
      with:
        project_id: ${{ vars.GKE_INTEGRATION_PROJECT_ID }}
        cluster_name: ${{ steps.tofu-output.outputs.peer_cluster_name }}
        location: ${{ steps.tofu-output.outputs.peer_cluster_location }}
    - name: Collect primary cluster artifacts
      if: always() && steps.primary-artifact-credentials.outcome == 'success'
      env:
        KUBECONFIG_PATH: ${{ steps.primary-artifact-credentials.outputs.kubeconfig_path }}
        ARTIFACT_DIR: artifacts/gke-integration/primary
      run: trusted/hack/integration/collect-artifacts.sh
    - name: Collect peer cluster artifacts
      if: always() && steps.peer-artifact-credentials.outcome == 'success'
      env:
        KUBECONFIG_PATH: ${{ steps.peer-artifact-credentials.outputs.kubeconfig_path }}
        ARTIFACT_DIR: artifacts/gke-integration/peer
      run: trusted/hack/integration/collect-artifacts.sh
    - name: Upload cluster artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: gke-integration-${{ github.event.pull_request.number }}-${{ github.run_id }}
        path: artifacts/gke-integration
        if-no-files-found: ignore
    - name: Remove public TCP service before destroy
      if: always() && steps.primary-artifact-credentials.outcome == 'success'
      continue-on-error: true
      env:
        KUBECONFIG_PATH: ${{ steps.primary-artifact-credentials.outputs.kubeconfig_path }}
      run: kubectl --kubeconfig "$KUBECONFIG_PATH" -n mynetwork delete service test-tcp --ignore-not-found --wait=true --timeout=5m
    - name: Refresh Google Cloud auth before destroy
      if: always() && steps.tofu-init.outcome == 'success'
      uses: google-github-actions/auth@v3
      with:
        project_id: ${{ vars.GKE_INTEGRATION_PROJECT_ID }}
        workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
    - name: OpenTofu destroy
      if: always() && steps.tofu-init.outcome == 'success'
      working-directory: trusted/infra/gke-integration
      env:
        TF_VAR_authorized_cidr: ${{ steps.runner-ip.outputs.cidr }}
      run: tofu destroy -auto-approve -input=false -no-color
