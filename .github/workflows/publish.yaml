name: Publish release image and chart

on:
  push:
    tags:
    - v*

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
    steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@stable
    - run: cargo test --all --locked
    - name: Extract version from tag
      id: metadata
      run: |
        set -euo pipefail
        TAG="${GITHUB_REF#refs/tags/}"
        VERSION="${TAG#v}"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        if [[ "$VERSION" == *-* ]]; then
          echo "prerelease=true" >> "$GITHUB_OUTPUT"
        else
          echo "prerelease=false" >> "$GITHUB_OUTPUT"
        fi

  build-images:
    needs: test
    strategy:
      matrix:
        include:
        - arch: amd64
          runner: ubuntu-24.04
          target: x86_64-unknown-linux-musl
          platform: linux/amd64
        - arch: arm64
          runner: ubuntu-24.04-arm
          target: aarch64-unknown-linux-musl
          platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
    - uses: actions/checkout@v7
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        flavor: latest=false,suffix=-${{ matrix.arch }}
        tags: |
          type=semver,pattern={{version}}
          type=ref,event=tag
    - name: Build and push image
      id: push
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        build-args: |
          TARGET=${{ matrix.target }}
          VERSION=${{ needs.test.outputs.version }}
        platforms: ${{ matrix.platform }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.arch }}-cache
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.arch }}-cache,mode=max
    - name: Generate image provenance
      uses: actions/attest-build-provenance@v4
      with:
        subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        subject-digest: ${{ steps.push.outputs.digest }}
        push-to-registry: true

  manifest:
    needs:
    - test
    - build-images
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      attestations: write
      id-token: write
    steps:
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha
    - name: Publish multi-architecture manifest
      id: manifest
      uses: int128/docker-manifest-create-action@v2
      with:
        index-annotations: ${{ steps.meta.outputs.labels }}
        tags: ${{ steps.meta.outputs.tags }}
        sources: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.test.outputs.version }}-amd64
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.test.outputs.version }}-arm64
    - name: Generate manifest provenance
      uses: actions/attest-build-provenance@v4
      with:
        subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        subject-digest: ${{ steps.manifest.outputs.digest }}
        push-to-registry: true

  helm:
    needs:
    - test
    - manifest
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
    - name: Checkout tagged source
      uses: actions/checkout@v7
      with:
        fetch-depth: 0
        fetch-tags: true
    - name: Stamp chart version
      uses: rmeneely/update-yaml@v1
      with:
        infile: charts/ndn-operator/Chart.yaml
        varlist: version=${{ needs.test.outputs.version }},appVersion=${{ needs.test.outputs.version }}
    - name: Stamp chart image tag
      uses: rmeneely/update-yaml@v1
      with:
        infile: charts/ndn-operator/values.yaml
        varlist: image.tag=${{ needs.test.outputs.version }}
    - name: Configure Git
      run: |
        git config user.name "$GITHUB_ACTOR"
        git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
    - name: Run chart-releaser
      uses: helm/chart-releaser-action@v1.7.0
      with:
        skip_existing: true
        mark_as_latest: ${{ needs.test.outputs.prerelease != 'true' }}
      env:
        CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
