apiVersion: v1
kind: Pod
metadata:
  name: test-helloworld-producer
  annotations:
    networks.named-data.net/name: test
    networks.named-data.net/namespace: mynetwork
    credentials.named-data.net/container: producer
    credentials.named-data.net/signing: Certificate/app-subnetwork1-helloworld
  labels:
    named-data.net/inject: "true"
spec:
  tolerations:
  - key: kubernetes.io/arch
    operator: Equal
    value: arm64
    effect: NoSchedule
  containers:
  - name: producer
    image: ghcr.io/ndn-operator/ndn-helloworld-rs:latest
    command: ["/producer"]
    args: ["--name", "/root-network/subnetwork1/helloworld/valid"]
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 128Mi
