apiVersion: v1
kind: Pod
metadata:
  name: subnetwork1-helloworld-producer
  namespace: mynetwork
  annotations:
    networks.named-data.net/name: subnetwork1
    networks.named-data.net/namespace: mynetwork
    credentials.named-data.net/container: producer
    credentials.named-data.net/signing: Certificate/app-subnetwork1-helloworld
  labels:
    named-data.net/inject: "true"
spec:
  containers:
  - name: producer
    image: ghcr.io/ndn-operator/ndn-helloworld-rs:0.1.0
    command: ["/producer"]
    args: ["--name", "/root-network/subnetwork1/helloworld/valid"]
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 128Mi
---
