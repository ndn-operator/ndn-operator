apiVersion: v1
kind: Pod
metadata:
  name: peer-helloworld-forger
  annotations:
    networks.named-data.net/name: test
    networks.named-data.net/namespace: mynetwork
    credentials.named-data.net/container: producer
    credentials.named-data.net/signing: ExternalCertificate/app-subnetwork2-helloworld
  labels:
    named-data.net/inject: "true"
spec:
  containers:
  - name: producer
    image: ghcr.io/ndn-operator/ndn-helloworld-rs:0.1.0
    command: ["/producer"]
    args: ["--name", "/root-network/subnetwork1/helloworld/forged"]
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 128Mi
