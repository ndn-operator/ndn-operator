apiVersion: batch/v1
kind: Job
metadata:
  name: peer-helloworld-consumer
spec:
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      annotations:
        networks.named-data.net/name: test
        networks.named-data.net/namespace: mynetwork
        credentials.named-data.net/container: consumer
        credentials.named-data.net/trust-anchors: ExternalCertificate/app-root
        credentials.named-data.net/certificate-chain: ExternalCertificate/app-subnetwork1-ca,ExternalCertificate/app-subnetwork1-helloworld
      labels:
        named-data.net/inject: "true"
    spec:
      restartPolicy: Never
      containers:
      - name: consumer
        image: ghcr.io/ndn-operator/ndn-helloworld-rs:0.1.0
        command: ["/consumer"]
        args: ["--name", "/root-network/subnetwork1/helloworld/valid"]
        imagePullPolicy: IfNotPresent
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 128Mi
