apiVersion: named-data.net/v1alpha1
kind: Network
metadata:
  name: peer
spec:
  prefix: /peer
  udpUnicastPort: 6363
  ndnd:
    image: ghcr.io/named-data/ndnd:1.5.2
  routerCertIssuer:
    kind: Certificate
    name: peer-root
  trustAnchors:
  - name: peer-root
    kind: Certificate
  - name: primary-root
    kind: ExternalCertificate
  faces:
    websocket:
      port: 9696
      serviceTemplate:
        spec:
          type: ClusterIP
