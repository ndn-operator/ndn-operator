apiVersion: named-data.net/v1alpha1
kind: Network
metadata:
  name: test
spec:
  prefix: /root-network/subnetwork2
  dvNetwork: /root-network
  udpUnicastPort: 6363
  ndnd:
    image: ghcr.io/named-data/ndnd:1.5.2
  routerCertIssuer:
    kind: Certificate
    name: peer-root
  trustAnchors:
  - name: peer-root
    kind: Certificate
  - name: primary-root
    kind: ExternalCertificate
